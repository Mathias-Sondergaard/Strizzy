<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StrizzyG — Creator Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]   {--accent:#c41e1e;--ag:rgba(196,30,30,.28);--ad:rgba(196,30,30,.12);--ab:rgba(196,30,30,.3);--bg:#0a0a0a;--bg2:#111;--sf:rgba(255,255,255,.04);--sfh:rgba(255,255,255,.08);--br:rgba(255,255,255,.08);--tx:#fff;--to:rgba(255,255,255,.85);--tm:rgba(255,255,255,.38);--a1:rgba(196,30,30,.12);--a2:rgba(83,74,183,.06)}
[data-theme="light"]  {--accent:#c41e1e;--ag:rgba(196,30,30,.2);--ad:rgba(196,30,30,.08);--ab:rgba(196,30,30,.25);--bg:#f2f2f2;--bg2:#fff;--sf:rgba(0,0,0,.04);--sfh:rgba(0,0,0,.07);--br:rgba(0,0,0,.1);--tx:#111;--to:#222;--tm:rgba(0,0,0,.45);--a1:rgba(196,30,30,.06);--a2:rgba(83,74,183,.04)}
[data-theme="purple"] {--accent:#7c3aed;--ag:rgba(124,58,237,.28);--ad:rgba(124,58,237,.12);--ab:rgba(124,58,237,.3);--bg:#0a0812;--bg2:#110f1a;--sf:rgba(255,255,255,.04);--sfh:rgba(255,255,255,.08);--br:rgba(255,255,255,.08);--tx:#fff;--to:rgba(255,255,255,.88);--tm:rgba(255,255,255,.4);--a1:rgba(124,58,237,.14);--a2:rgba(196,30,30,.05)}
[data-theme="ocean"]  {--accent:#0ea5e9;--ag:rgba(14,165,233,.28);--ad:rgba(14,165,233,.12);--ab:rgba(14,165,233,.3);--bg:#060d14;--bg2:#0c1824;--sf:rgba(255,255,255,.04);--sfh:rgba(255,255,255,.08);--br:rgba(255,255,255,.08);--tx:#fff;--to:rgba(255,255,255,.88);--tm:rgba(255,255,255,.4);--a1:rgba(14,165,233,.12);--a2:rgba(6,182,212,.06)}
[data-theme="forest"] {--accent:#16a34a;--ag:rgba(22,163,74,.28);--ad:rgba(22,163,74,.1);--ab:rgba(22,163,74,.3);--bg:#050d08;--bg2:#0a1410;--sf:rgba(255,255,255,.04);--sfh:rgba(255,255,255,.08);--br:rgba(255,255,255,.08);--tx:#fff;--to:rgba(255,255,255,.88);--tm:rgba(255,255,255,.4);--a1:rgba(22,163,74,.12);--a2:rgba(134,239,172,.04)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;transition:background .4s,color .4s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,var(--a1) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,var(--a2) 0%,transparent 60%);pointer-events:none;z-index:0;transition:background .4s}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;background:rgba(10,10,10,.9);backdrop-filter:blur(16px);border-bottom:.5px solid var(--br);transition:background .4s}
[data-theme="light"] .topbar{background:rgba(242,242,242,.92)}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.topbar-logo img{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;flex-shrink:0}
.topbar-logo span{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
/* Desktop nav links */
.topbar-nav{display:flex;gap:3px}
.topbar-nav a{font-size:12px;color:var(--tm);text-decoration:none;padding:5px 11px;border-radius:20px;border:.5px solid transparent;transition:color .2s,background .2s,border-color .2s;white-space:nowrap}
.topbar-nav a:hover,.topbar-nav a.active{color:var(--tx);background:var(--sfh);border-color:var(--br)}

/* ── THEME BTN ── */
.theme-wrap{position:relative}
.theme-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--br);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:border-color .2s,transform .15s;flex-shrink:0}
.theme-btn:hover{border-color:var(--accent);transform:scale(1.08)}
.theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:#1a1a1a;border:.5px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;display:none;flex-direction:column;gap:3px;min-width:150px;z-index:400;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.theme-panel.open{display:flex}
.tpl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600;margin-bottom:2px;padding:0 4px}
.tpo{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;border:.5px solid transparent;transition:background .15s;font-size:13px;color:rgba(255,255,255,.72)}
.tpo:hover{background:rgba(255,255,255,.07);color:#fff}
.tpo.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);color:#fff;font-weight:500}
.tdot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.1)}

/* ── ADMIN BTN ── */
.admin-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:20px;border:.5px solid var(--br);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.admin-btn:hover{color:var(--tx);border-color:var(--accent);background:var(--sfh)}
body.admin-mode .admin-btn{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── BURGER ── */
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;border:none;background:var(--sf);border-radius:10px;border:.5px solid var(--br);padding:8px;flex-shrink:0;transition:border-color .2s}
.burger:hover{border-color:var(--accent)}
.burger span{display:block;height:2px;background:var(--tx);border-radius:2px;transition:transform .3s,opacity .3s,width .3s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;width:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── MOBILE MENU DRAWER ── */
.mobile-menu{position:fixed;top:56px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:.5px solid var(--br);padding:0;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.mobile-menu.open{max-height:400px;padding:12px 16px 20px}
.mobile-menu a,.mobile-menu button{display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;border-radius:12px;font-size:15px;font-weight:500;color:var(--tx);text-decoration:none;background:none;border:none;cursor:pointer;font-family:inherit;transition:background .15s;text-align:left}
.mobile-menu a:hover,.mobile-menu button:hover{background:var(--sfh)}
.mobile-menu a.active{color:var(--accent);background:var(--ad)}
.mobile-menu-sep{height:.5px;background:var(--br);margin:8px 0}
.mobile-admin-btn{color:var(--tm)!important}
body.admin-mode .mobile-admin-btn{color:var(--accent)!important}
/* Theme row inside mobile menu */
.mobile-theme-row{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap}
.mobile-theme-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .2s,transform .15s;flex-shrink:0}
.mobile-theme-dot:hover{transform:scale(1.1)}
.mobile-theme-dot.active{border-color:var(--tx)}
.mobile-theme-label{font-size:11px;color:var(--tm);padding:0 16px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* ── LOGIN MODAL ── */
.login-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
.login-bg.open{display:flex}
.login-box{background:var(--bg2);border:.5px solid var(--br);border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.login-logo{width:56px;height:56px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;margin:0 auto 14px}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:4px;color:var(--tx)}
.login-box p{font-size:13px;color:var(--tm);margin-bottom:20px}
.login-input{width:100%;background:var(--sf);border:.5px solid var(--br);border-radius:12px;padding:13px;font-size:20px;color:var(--tx);font-family:inherit;outline:none;transition:border-color .2s;text-align:center;letter-spacing:6px;margin-bottom:10px}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{letter-spacing:0;font-size:14px;color:var(--tm)}
.login-err{font-size:12px;color:#f87171;margin-bottom:10px;min-height:16px}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-bottom:10px}
.btn-login:hover{opacity:.85}
.btn-cancel-login{width:100%;background:none;border:none;color:var(--tm);font-size:13px;cursor:pointer;padding:6px}
.btn-cancel-login:hover{color:var(--tx)}

/* ── ADMIN BAR ── */
.admin-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(196,30,30,.96);backdrop-filter:blur(12px);padding:10px 16px;align-items:center;justify-content:space-between;border-top:.5px solid rgba(255,255,255,.2);gap:12px}
.admin-bar.visible{display:flex}
.admin-bar-left{font-size:13px;color:#fff;font-weight:600;flex:1;min-width:0}
.admin-logout{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.admin-logout:hover{background:rgba(255,255,255,.35)}

/* ── EDIT LINK MODAL ── */
.editlink-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
.editlink-bg.open{display:flex}
.editlink-box{background:var(--bg2);border:.5px solid var(--br);border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.editlink-box h2{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--tx)}
.editlink-box label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tm);margin-bottom:5px}
.editlink-box input{width:100%;background:var(--sf);border:.5px solid var(--br);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--tx);font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:14px}
.editlink-box input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--sf);color:var(--to);border:.5px solid var(--br);border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer}
.btn-cancel:hover{background:var(--sfh)}

/* ── MAIN CARD ── */
.card{position:relative;z-index:1;width:100%;max-width:480px;padding:76px 20px 60px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.profile{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.avatar{width:90px;height:90px;border-radius:50%;border:2.5px solid var(--accent);overflow:hidden;margin-bottom:14px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 28px var(--ag)}50%{box-shadow:0 0 48px var(--ag),0 0 80px var(--ad)}}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.pname{font-size:24px;font-weight:700;color:var(--tx);margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);background:var(--ad);border:.5px solid var(--ab);padding:4px 12px;border-radius:20px}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── LINKS ── */
.links{width:100%;display:flex;flex-direction:column;gap:10px}
.sl{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--sf);border:.5px solid var(--br);border-radius:14px;text-decoration:none;color:var(--tx);transition:background .18s,transform .15s;position:relative;overflow:hidden}
.sl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .2s;border-radius:3px 0 0 3px}
.sl:hover{background:var(--sfh);transform:translateX(4px)}
.sl:hover::before{opacity:1}
.sl:active{transform:scale(.97)}
.sl-tw::before{background:#6441a5}.sl-x::before{background:#e7e7e7}.sl-ig::before{background:linear-gradient(180deg,#833ab4,#fd1d1d,#fcb045)}.sl-tt::before{background:#e7e7e7}.sl-yt::before{background:#f00}.sl-dc::before{background:#5865F2}
.si{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si-tw{background:#6441a5}.si-x{background:#111;border:.5px solid rgba(255,255,255,.15)}.si-ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)}.si-tt{background:#111;border:.5px solid rgba(255,255,255,.15)}.si-yt{background:#f00}.si-dc{background:#5865F2}
.sl-label{flex:1;min-width:0}
.sl-name{font-size:14px;font-weight:500;color:var(--tx)}
.sl-handle{font-size:11px;color:var(--tm);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sarr{color:var(--tm);font-size:16px;transition:transform .2s,color .2s;flex-shrink:0}
.sl:hover .sarr{transform:translateX(3px);color:var(--tx)}
.sl-edit{display:none;position:absolute;right:36px;top:50%;transform:translateY(-50%);background:var(--ad);border:.5px solid var(--ab);color:var(--accent);border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;z-index:2;white-space:nowrap}
.sl-edit:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
body.admin-mode .sl-edit{display:block}

.footer{margin-top:auto;padding-top:28px;font-size:12px;color:var(--tm);text-align:center}
.footer a{color:var(--accent);text-decoration:none}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .5s ease,transform .5s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar-nav,.admin-btn{display:none}
  .burger{display:flex}
  .card{padding:68px 16px 60px}
  .avatar{width:80px;height:80px}
  .pname{font-size:22px}
}
</style>
</head>

<script>
const PW_HASH='447512622f9767785e7dac3176232565e58fbf84ec87f783607cfbb95d82375b';
const SESSION_KEY='sg-admin-session';
const SESSION_DURATION=30*60*1000;

// ── AUTH ──
async function sha256(msg){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function isAdminActive(){const s=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');if(!s)return false;if(Date.now()-s.ts>SESSION_DURATION){sessionStorage.removeItem(SESSION_KEY);return false}return s.auth===true}
function applyAdminState(){
  const a=isAdminActive();
  document.body.classList.toggle('admin-mode',a);
  document.getElementById('adminBar').classList.toggle('visible',a);
  document.getElementById('adminBtn').textContent=a?'🔓 In':'🔐 Admin';
  const mb=document.querySelector('.mobile-admin-btn');
  if(mb)mb.textContent=a?'🔓 Logged In — tap to logout':'🔐 Admin Login';
}
function openLogin(){if(isAdminActive()){adminLogout();return}document.getElementById('loginBg').classList.add('open');setTimeout(()=>document.getElementById('loginPw').focus(),100)}
function closeLogin(){document.getElementById('loginBg').classList.remove('open');document.getElementById('loginPw').value='';document.getElementById('loginErr').textContent=''}
async function tryLogin(){const pw=document.getElementById('loginPw').value;const hash=await sha256(pw);if(hash===PW_HASH){sessionStorage.setItem(SESSION_KEY,JSON.stringify({auth:true,ts:Date.now()}));closeLogin();applyAdminState()}else{document.getElementById('loginErr').textContent='Wrong password — try again.';document.getElementById('loginPw').value='';document.getElementById('loginPw').focus()}}
function adminLogout(){sessionStorage.removeItem(SESSION_KEY);applyAdminState()}
document.getElementById('loginBg').addEventListener('click',function(e){if(e.target===this)closeLogin()});
document.addEventListener('click',()=>{if(isAdminActive()){const s=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');if(s){s.ts=Date.now();sessionStorage.setItem(SESSION_KEY,JSON.stringify(s))}}});

// ── BURGER ──
const burger=document.getElementById('burger');
const mobileMenu=document.getElementById('mobileMenu');
function closeBurger(){burger.classList.remove('open');mobileMenu.classList.remove('open')}
burger.addEventListener('click',e=>{e.stopPropagation();burger.classList.toggle('open');mobileMenu.classList.toggle('open')});
document.addEventListener('click',e=>{if(!mobileMenu.contains(e.target)&&!burger.contains(e.target))closeBurger()});

// ── THEME ──
const htmlEl=document.documentElement;
function applyTheme(t){
  htmlEl.setAttribute('data-theme',t);
  document.querySelectorAll('.tpo').forEach(o=>o.classList.toggle('active',o.dataset.theme===t));
  document.querySelectorAll('.mobile-theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===t));
  localStorage.setItem('sg-theme',t);
}
document.getElementById('themeToggle').addEventListener('click',e=>{e.stopPropagation();document.getElementById('themePanel').classList.toggle('open')});
document.addEventListener('click',()=>document.getElementById('themePanel').classList.remove('open'));
document.getElementById('themePanel').addEventListener('click',e=>e.stopPropagation());
document.querySelectorAll('.tpo').forEach(o=>o.addEventListener('click',()=>{applyTheme(o.dataset.theme);document.getElementById('themePanel').classList.remove('open')}));
document.querySelectorAll('.mobile-theme-dot').forEach(d=>d.addEventListener('click',()=>applyTheme(d.dataset.theme)));
const saved=localStorage.getItem('sg-theme');if(saved)applyTheme(saved);

// ── LINKS ──
const DEFAULT_LINKS=[
  {id:'tw',name:'Twitch',   handle:'twitch.tv/strizzyg',        url:'https://www.twitch.tv/strizzyg',       icon:'tw'},
  {id:'x', name:'X / Twitter',handle:'@StrizzyGG',              url:'https://twitter.com/StrizzyGG',        icon:'x'},
  {id:'ig',name:'Instagram',handle:'@strizzyg',                 url:'https://www.instagram.com/strizzyg/',  icon:'ig'},
  {id:'tt',name:'TikTok',   handle:'@strizzyg',                 url:'https://www.tiktok.com/@strizzyg',     icon:'tt'},
  {id:'yt',name:'YouTube',  handle:'@StrizzyGG',                url:'https://www.youtube.com/@StrizzyGG',   icon:'yt'},
  {id:'dc',name:'Discord',  handle:'Join the server',           url:'https://discord.gg/kYp23wWDAN',        icon:'dc'},
];
const ICONS={
  tw:'<svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M21 2H3v16h5v4l4-4h5l4-4V2zm-10 9H9V7h2v4zm4 0h-2V7h2v4z"/></svg>',

  tt:'<svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>',

};
function getLinks(){const r=localStorage.getItem('sg-links');return r?JSON.parse(r):DEFAULT_LINKS}
function saveLinks(l){localStorage.setItem('sg-links',JSON.stringify(l))}
function renderLinks(){
  const list=document.getElementById('linksList');
  const links=getLinks();
  list.innerHTML=links.map((l,i)=>`
    <a class="sl sl-${l.icon} reveal" href="${l.url}" target="_blank" rel="noopener" style="transition-delay:${i*.05}s">
      <span class="si si-${l.icon}">${ICONS[l.icon]||''}</span>
      <div class="sl-label"><div class="sl-name">${l.name}</div><div class="sl-handle">${l.handle}</div></div>
      <button class="sl-edit" onclick="openEditLink(event,${i})">✏️ Edit</button>
      <span class="sarr">→</span>
    </a>`).join('');
  document.querySelectorAll('.reveal:not(.visible)').forEach(el=>robs.observe(el));
}
let editIdx=null;
function openEditLink(e,i){e.preventDefault();e.stopPropagation();if(!isAdminActive())return;editIdx=i;const l=getLinks()[i];document.getElementById('editLinkTitle').textContent='Edit '+l.name;document.getElementById('el-name').value=l.name;document.getElementById('el-handle').value=l.handle;document.getElementById('el-url').value=l.url;document.getElementById('editLinkBg').classList.add('open')}
function closeEditLink(){document.getElementById('editLinkBg').classList.remove('open')}
function saveLink(){if(editIdx===null)return;const links=getLinks();links[editIdx].name=document.getElementById('el-name').value;links[editIdx].handle=document.getElementById('el-handle').value;links[editIdx].url=document.getElementById('el-url').value;saveLinks(links);renderLinks();closeEditLink()}
document.getElementById('editLinkBg').addEventListener('click',function(e){if(e.target===this)closeEditLink()});

// ── REVEAL ──
const robs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');robs.unobserve(x.target)}}),{threshold:.08});
document.querySelectorAll('.reveal').forEach(el=>robs.observe(el));

renderLinks();
applyAdminState();
</script>
